version: "3.8"


services:


  postgres:

    image: postgres:17

    container_name: saas-postgres

    environment:

      POSTGRES_DB: multitenant

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: root


    ports:

      - "5432:5432"



  backend:


    image: multitenant-backend


    container_name: saas-backend


    depends_on:

      - postgres


    ports:

      - "8080:8080"


    environment:


      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/multitenant


      SPRING_DATASOURCE_USERNAME: postgres


      SPRING_DATASOURCE_PASSWORD: root